name: Release to Production Environment

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      command:
        description: "実行するkamalコマンド"
        required: true
        default: deploy
        type: choice
        options:
          - deploy
          - proxy-boot-config
          - setup
          - rollback

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || vars.KAMAL_DEPLOY_ENABLED == 'true'

    steps:
      - name: Deploy on production server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 30m
          script_stop: true
          script: |
            set -euo pipefail
            cd ~/amiverse/backend

            git fetch origin main
            git reset --hard origin/main

            if [ ! -f .env.deploy ]; then
              echo "::error::.env.deploy がサーバー上にありません。DEPLOY.md を参照してください。"
              exit 1
            fi

            kamal() {
              docker run --rm \
                --network host \
                -v "$HOME/amiverse:/amiverse" \
                -w /amiverse/backend \
                -v /var/run/docker.sock:/var/run/docker.sock \
                -v "$HOME/.ssh:/root/.ssh:ro" \
                -e GIT_CONFIG_COUNT=1 \
                -e GIT_CONFIG_KEY_0=safe.directory \
                -e GIT_CONFIG_VALUE_0='*' \
                --env-file .env.deploy \
                ghcr.io/basecamp/kamal:v2.8.2 "$@"
            }

            assert_boot_config() {
              if ! kamal proxy boot_config get 2>&1 | grep -q "3002"; then
                echo "::error::kamal-proxyのboot_configが未設定です。先に proxy-boot-config を実行してください。"
                exit 1
              fi
            }

            case "${{ inputs.command || 'deploy' }}" in
              proxy-boot-config)
                kamal proxy boot_config set \
                  --publish-host-ip 127.0.0.1 --http-port 3002 --https-port 3443
                echo "--- 保存された設定 ---"
                kamal proxy boot_config get
                ;;
              setup)
                assert_boot_config
                kamal setup
                ;;
              rollback)
                kamal rollback
                ;;
              *)
                assert_boot_config
                kamal deploy
                ;;
            esac
