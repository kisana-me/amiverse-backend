name: Release to Production Environment

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      command:
        description: "実行するkamalコマンド"
        required: true
        default: deploy
        type: choice
        options:
          - deploy
          - proxy-boot-config
          - setup
          - rollback

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || vars.KAMAL_DEPLOY_ENABLED == 'true'
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
      DEPLOY_SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
      RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
      DB_USERNAME: ${{ secrets.DB_USERNAME }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      S3_USERNAME: ${{ secrets.S3_USERNAME }}
      S3_PASSWORD: ${{ secrets.S3_PASSWORD }}
      S3_API_ENDPOINT: ${{ secrets.S3_API_ENDPOINT }}
      S3_LOCAL_ENDPOINT: ${{ secrets.S3_LOCAL_ENDPOINT }}
      MEILISEARCH_API_KEY: ${{ secrets.MEILISEARCH_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Verify required secrets are present
        run: |
          missing=()
          for key in DEPLOY_HOST RAILS_MASTER_KEY DB_USERNAME DB_PASSWORD \
                     S3_USERNAME S3_PASSWORD S3_API_ENDPOINT S3_LOCAL_ENDPOINT \
                     MEILISEARCH_API_KEY; do
            [ -n "${!key}" ] || missing+=("$key")
          done
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::未設定のシークレット: ${missing[*]}"
            exit 1
          fi

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"

      - name: Install Kamal
        run: gem install kamal -v 2.8.2

      - uses: docker/setup-buildx-action@v3

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          port="${DEPLOY_SSH_PORT:-22}"
          user="${DEPLOY_SSH_USER:-root}"

          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy

          # 鍵が正しい形式か (改行落ち・パスフレーズ付きをここで検出する)
          if ! ssh-keygen -y -f ~/.ssh/id_deploy > /dev/null 2>&1; then
            echo "::error::SSH_PRIVATE_KEY を秘密鍵として読めません。改行が保たれているか、パスフレーズ無しかを確認してください。"
            exit 1
          fi

          # ポートが開いているか。ここで落ちるならファイアウォール/IP制限を疑う。
          if ! timeout 10 bash -c "cat < /dev/null > /dev/tcp/$DEPLOY_HOST/$port" 2>/dev/null; then
            echo "::error::$DEPLOY_HOST:$port へTCP接続できません。GitHub ActionsのランナーIPからSSHポートが開いているか確認してください。"
            exit 1
          fi

          # Kamalが使うnet-sshは、ssh-keyscanが返す複数の鍵型(rsa/ecdsa/ed25519)や
          # -H のハッシュ化エントリをうまく扱えず HostKeyMismatch になることがある。
          # 型を1つに絞り、ハッシュ化しない形で記録する。
          : > ~/.ssh/known_hosts
          for t in ed25519 rsa; do
            if ssh-keyscan -t "$t" -p "$port" "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null \
               && [ -s ~/.ssh/known_hosts ]; then
              echo "known_hosts: $t の鍵を記録しました"
              break
            fi
          done
          if [ ! -s ~/.ssh/known_hosts ]; then
            echo "::error::ssh-keyscan がホスト鍵を取得できませんでした。"
            exit 1
          fi
          chmod 644 ~/.ssh/known_hosts

          cat >> ~/.ssh/config <<EOF
          Host $DEPLOY_HOST
            User $user
            Port $port
            IdentityFile ~/.ssh/id_deploy
            IdentitiesOnly yes
          EOF

          # 鍵認証とdocker権限をここで確定させる (OpenSSH)
          if ! ssh -o BatchMode=yes "$DEPLOY_HOST" 'docker version --format "{{.Server.Version}}"'; then
            echo "::error::SSH接続、またはサーバー上でのdocker実行に失敗しました。公開鍵の登録と、$user が dockerグループに入っているかを確認してください。"
            exit 1
          fi

          # Kamalが実際に使うのはnet-ssh。OpenSSHが通ってもここで落ちることがあるため、
          # kamalを走らせる前に同じ経路で検証する。
          if ! ruby -rnet/ssh -e '
            Net::SSH.start(ENV.fetch("DEPLOY_HOST"), ENV["DEPLOY_SSH_USER"] || "root",
                           port: (ENV["DEPLOY_SSH_PORT"] || 22).to_i,
                           keys: [File.expand_path("~/.ssh/id_deploy")],
                           keys_only: true, non_interactive: true) do |ssh|
              puts "net-ssh OK: #{ssh.exec!("docker version --format {{.Server.Version}}").strip}"
            end
          '; then
            echo "::error::net-ssh でのSSH接続に失敗しました。HostKeyMismatch の場合は known_hosts の鍵型が合っていません。"
            exit 1
          fi

      - name: Run Kamal
        run: |
          # kamal-proxyは既定で 0.0.0.0:80/443 を publish し、前段のnginxと衝突する。
          # setup/deploy の前に、サーバー上に 3002 のboot_configが保存済みか確認する。
          assert_boot_config() {
            if ! kamal proxy boot_config get 2>&1 | grep -q "3002"; then
              echo "::error::kamal-proxyのboot_configが未設定です。先に Run workflow から proxy-boot-config を実行してください (このままsetupするとnginxと80/443が衝突します)。"
              exit 1
            fi
          }

          case "${{ inputs.command || 'deploy' }}" in
            proxy-boot-config)
              kamal proxy boot_config set \
                --publish-host-ip 127.0.0.1 --http-port 3002 --https-port 3443
              echo "--- 保存された設定 ---"
              kamal proxy boot_config get
              ;;
            setup)
              assert_boot_config
              kamal setup
              ;;
            rollback)
              kamal rollback
              ;;
            *)
              assert_boot_config
              kamal deploy
              ;;
          esac

      - name: Show container logs on failure
        if: failure()
        run: kamal app logs --lines 100 || true
